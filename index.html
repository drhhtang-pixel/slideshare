<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程投影片</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f4f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ── */
    .navbar {
      background: #1a1a2e;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #fff;
    }

    .nav-logo-icon {
      width: 32px; height: 32px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-logo-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav-logo-text span { color: #00a0dc; }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-count {
      font-size: 0.78rem;
      color: #64748b;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #0f0c29, #1a1a3e 50%, #0077b5);
      padding: 1.4rem 2rem 1.2rem;
      text-align: center;
      color: #fff;
    }

    .hero h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .hero p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
    }

    /* ── Main ── */
    .main {
      max-width: 1720px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .section-sub {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    /* ── Grid ── */
    .slide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ── */
    .slide-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .slide-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      transform: translateY(-3px);
    }

    /* Thumbnail — 16:9 */
    .card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #e8edf5;
      overflow: hidden;
    }

    .card-thumb canvas,
    .card-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Hover overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 119, 181, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .slide-card:hover .card-overlay { opacity: 1; }

    .overlay-btn {
      background: #fff;
      color: #0077b5;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.45rem 1.1rem;
      border-radius: 20px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* Skeleton loader */
    .card-thumb.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #e8edf5 25%, #d4dbe6 50%, #e8edf5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Card body */
    .card-body {
      padding: 0.9rem 1rem 0.8rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.45;
      color: #1a1a2e;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .card-type {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0077b5;
      background: #e8f4fb;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
    }

    .card-arrow {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* Empty */
    .empty-msg {
      text-align: center;
      color: #94a3b8;
      margin-top: 4rem;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .hero { padding: 2rem 1rem 1.8rem; }
      .hero h1 { font-size: 1.4rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .slide-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .navbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><img src="img/ditllogo.png" alt="DITL"></div>
      <span class="nav-logo-text">DITL<span>DESIGN</span></span>
    </a>
    <div class="nav-right">
      <span id="nav-count" class="nav-count"></span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1>課程投影片庫</h1>
    <p>選擇一份投影片，在瀏覽器中直接播放</p>
  </section>

  <!-- Main grid -->
  <main class="main">
    <div class="section-header">
      <span class="section-title">所有投影片</span>
      <span id="section-sub" class="section-sub"></span>
    </div>
    <div id="slide-grid" class="slide-grid"></div>
    <p id="empty-msg" class="empty-msg" style="display:none">目前沒有投影片</p>
  </main>

  <script src="js/pdf.min.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/pdf.worker.min.js';

      async function renderThumb(canvas, filename) {
        const thumb = canvas.parentElement;
        try {
          const doc  = await pdfjsLib.getDocument('slides/' + encodeURIComponent(filename)).promise;
          const page = await doc.getPage(1);
          const vp0  = page.getViewport({ scale: 1 });
          const W = thumb.clientWidth  || 320;
          const H = thumb.clientHeight || 180;
          const scale = Math.max(W / vp0.width, H / vp0.height);
          const vp = page.getViewport({ scale });
          canvas.width  = vp.width;
          canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          thumb.classList.remove('loading');
        } catch (_) {
          thumb.classList.remove('loading');
        }
      }

      fetch('slides/index.json')
        .then(r => r.json())
        .then(files => {
          const visible = (files || []).filter(e => e.hidden !== true);
          if (visible.length === 0) {
            document.getElementById('empty-msg').style.display = 'block';
            return;
          }

          document.getElementById('nav-count').textContent = visible.length + ' 份簡報';
          document.getElementById('section-sub').textContent = visible.length + ' 份';

          const grid = document.getElementById('slide-grid');

          visible.forEach(entry => {
            const title = (entry.title && entry.title.trim()) ? entry.title : entry.file.replace(/\.pdf$/i, '');

            const card = document.createElement('a');
            card.className = 'slide-card';
            card.href = `viewer.html?pdf=${encodeURIComponent(entry.file)}`;

            // Thumb
            const thumb = document.createElement('div');
            thumb.className = 'card-thumb loading';
            thumb.dataset.file = entry.file;

            const overlay = document.createElement('div');
            overlay.className = 'card-overlay';
            overlay.innerHTML = '<span class="overlay-btn">開啟</span>';

            // Try pre-generated JPEG thumbnail; fall back to PDF.js on error
            const thumbFile = entry.file.replace(/\.pdf$/i, '.jpg');
            const img = document.createElement('img');
            img.src = 'slides/thumbs/' + encodeURIComponent(thumbFile);
            img.loading = 'lazy';
            img.alt = '';
            img.onload = () => thumb.classList.remove('loading');
            img.onerror = () => {
              img.remove();
              const canvas = document.createElement('canvas');
              thumb.insertBefore(canvas, overlay);
              renderThumb(canvas, entry.file);
            };

            thumb.appendChild(img);
            thumb.appendChild(overlay);

            // Body
            const body = document.createElement('div');
            body.className = 'card-body';
            body.innerHTML = `
              <div class="card-title">${title}</div>
              <div class="card-meta">
                <span class="card-type">PDF</span>
                <span class="card-arrow">→</span>
              </div>`;

            card.appendChild(thumb);
            card.appendChild(body);
            grid.appendChild(card);
          });
        })
        .catch(() => {
          document.getElementById('empty-msg').style.display = 'block';
        });
    });
  </script>
</body>
</html>
